# Exp08 - SWA随机权重平均
model: yolov8s.pt
data: data/aluminum/data.yaml

epochs: 100
imgsz: 640
batch: 16
patience: 20

swa:
  enabled: true
  start_epoch: 80
  frequency: 5

optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

project: experiments/exp08_swa
name: swa_run
exist_ok: true
