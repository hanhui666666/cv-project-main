# Exp05 - BiFPN改进
model: yolov8s_bifpn.pt
data: data/aluminum/data.yaml

epochs: 100
imgsz: 640
batch: 16
patience: 20

neck:
  type: BiFPN
  enabled: true
  num_channels: 256
  num_repeats: 3

optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

project: experiments/exp05_bifpn
name: bifpn_run
exist_ok: true
