# Exp06 - 数据增强
model: yolov8s.pt
data: data/aluminum/data.yaml

epochs: 100
imgsz: 640
batch: 16
patience: 20

augment: true
mosaic: 1.0
mixup: 0.15
copy_paste: 0.1
close_mosaic: 10

hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5

optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

project: experiments/exp06_augment
name: augment_run
exist_ok: true
