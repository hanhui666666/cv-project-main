# Exp09 - 跨域迁移
model: yolov8s.pt
data_source: data/aluminum/data.yaml
data_target: data/fabric/data.yaml

epochs: 100
imgsz: 640
batch: 16
patience: 20

domain_adaptation:
  enabled: true
  method: fine_tune
  source_epochs: 50
  target_epochs: 50
  freeze_backbone: false

optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

project: experiments/exp09_domain
name: domain_adapt_run
exist_ok: true
